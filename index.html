<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joke</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 3.5rem);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 10px #fff,
        0 0 30px #a259ff,
        0 0 60px #a259ff,
        0 0 100px #6a00ff;
      animation: pulse 2.5s ease-in-out infinite;
      letter-spacing: 0.02em;
      line-height: 1.3;
      max-width: 80vw;
    }

    .badge {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 0.4rem 1.2rem;
      border: 1px solid rgba(162, 89, 255, 0.5);
      border-radius: 999px;
      color: rgba(162, 89, 255, 0.9);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px #fff, 0 0 30px #a259ff, 0 0 60px #a259ff, 0 0 100px #6a00ff; }
      50%       { text-shadow: 0 0 20px #fff, 0 0 50px #c084fc, 0 0 90px #c084fc, 0 0 140px #8b00ff; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="content">
    <h1>I'm better with AI than you are Jennie</h1>
    <div class="badge">Powered with Jeff ⚡</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, stars, nodes, links;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function initStars() {
      stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: randomBetween(0.4, 1.8),
        alpha: randomBetween(0.3, 1),
        speed: randomBetween(0.0003, 0.002),
        phase: Math.random() * Math.PI * 2,
      }));
    }

    function initNodes() {
      nodes = Array.from({ length: 55 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: randomBetween(-0.3, 0.3),
        vy: randomBetween(-0.3, 0.3),
        r: randomBetween(1.5, 3.5),
      }));
    }

    function drawStars(t) {
      stars.forEach(s => {
        const alpha = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
      });
    }

    function drawNodes(t) {
      const LINK_DIST = 130;

      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) {
            const alpha = (1 - dist / LINK_DIST) * 0.35;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(162,89,255,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      nodes.forEach(n => {
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 3);
        grd.addColorStop(0, 'rgba(192,132,252,0.9)');
        grd.addColorStop(1, 'rgba(162,89,255,0)');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      });
    }

    function drawScanline(t) {
      const y = (t * 0.04) % H;
      const grad = ctx.createLinearGradient(0, y - 60, 0, y + 60);
      grad.addColorStop(0, 'rgba(162,89,255,0)');
      grad.addColorStop(0.5, 'rgba(162,89,255,0.04)');
      grad.addColorStop(1, 'rgba(162,89,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, y - 60, W, 120);
    }

    function loop(t) {
      ctx.clearRect(0, 0, W, H);
      drawStars(t);
      drawScanline(t);
      drawNodes(t);
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); initStars(); initNodes(); });
    resize();
    initStars();
    initNodes();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
